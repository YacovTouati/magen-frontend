<div class="auth-container" dir="rtl">
  <div class="auth-card">
    <h1 class="main-title">איפוס סיסמה</h1>
    <p class="subtitle">בחרו סיסמה חדשה לחשבון שלכם</p>

    <ng-container *ngIf="linkInvalid; else contentTpl">
      <div class="alert error">
        קישור איפוס הסיסמה אינו תקין או חסר. יש לבקש קישור חדש.
      </div>
      <a routerLink="/forgot-password" class="back-link">בקשת קישור חדש</a>
    </ng-container>

    <ng-template #contentTpl>
      <ng-container *ngIf="isSuccess; else formTpl">
        <div class="alert success">הסיסמה אופסה בהצלחה! ניתן כעת להתחבר עם הסיסמה החדשה.</div>
        <a routerLink="/login" class="back-link">מעבר למסך הכניסה</a>
      </ng-container>

      <ng-template #formTpl>
        <form (ngSubmit)="onSubmit()" novalidate>
          <div class="form-group">
            <label for="rp-password">סיסמה חדשה</label>
            <div class="password-field">
              <input id="rp-password" [type]="showPassword ? 'text' : 'password'" [(ngModel)]="password"
                name="password" required class="form-input" placeholder="הכנס/י סיסמה חדשה..."
                autocomplete="new-password" />
              <button type="button" class="toggle-visibility" (click)="showPassword = !showPassword"
                [attr.aria-label]="showPassword ? 'הסתר סיסמה' : 'הצג סיסמה'">
                {{ showPassword ? '🙈' : '👁️' }}
              </button>
            </div>
            <app-password-requirements [password]="password"></app-password-requirements>
          </div>

          <div class="form-group">
            <label for="rp-confirm">אימות סיסמה</label>
            <div class="password-field">
              <input id="rp-confirm" [type]="showConfirmPassword ? 'text' : 'password'" [(ngModel)]="confirmPassword"
                name="confirmPassword" required class="form-input" placeholder="הכנס/י שוב את הסיסמה..."
                autocomplete="new-password" />
              <button type="button" class="toggle-visibility" (click)="showConfirmPassword = !showConfirmPassword"
                [attr.aria-label]="showConfirmPassword ? 'הסתר סיסמה' : 'הצג סיסמה'">
                {{ showConfirmPassword ? '🙈' : '👁️' }}
              </button>
            </div>
            <p class="field-error" *ngIf="confirmPassword && !passwordsMatch">הסיסמאות אינן תואמות</p>
          </div>

          <div class="alert error" *ngIf="errorMessage">{{ errorMessage }}</div>

          <button type="submit" class="btn btn-primary" [disabled]="!canSubmit">
            {{ isSubmitting ? 'מאפס/ת...' : 'איפוס סיסמה' }}
          </button>

          <a routerLink="/login" class="back-link">חזרה למסך הכניסה</a>
        </form>
      </ng-template>
    </ng-template>
  </div>
</div>
