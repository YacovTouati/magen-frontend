<app-modal-shell [isOpen]="isOpen" maxWidth="380px" (backdropClick)="onClose()">
  <div class="success-body">
    <div class="success-icon">✓</div>
    <h3 class="success-title">{{ title }}</h3>
    <p class="success-message" *ngIf="message">{{ message }}</p>

    <div class="success-actions">
      <button type="button" class="btn-primary-action" (click)="onClose()">{{ closeLabel }}</button>
    </div>
  </div>
</app-modal-shell>
