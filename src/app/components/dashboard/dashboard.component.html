<div class="magen-wrapper" dir="rtl">
  <div class="dashboard-layout">
    <app-sidebar [currentUserEmail]="currentUserEmail" [currentQuote]="currentQuote" [currentTab]="currentTab"
      [isAdmin]="isAdmin" [isSuperAdmin]="isSuperAdmin" (tabChange)="switchTab($event)" (logoutEvent)="logout()"></app-sidebar>

    <main class="main-content">
      <!--
        Always visible regardless of which tab/route is active (SUPER_ADMIN/INTAKE_ADMIN
        only) — not tied to currentTab or router-outlet at all, unlike the legacy tabs
        below. It's already a self-contained collapsible accordion (closed by default,
        click the strip to expand — see intake-alerts.component.html/css), so it doesn't
        need a second wrapper. Previously only ever rendered inside the retired, unrouted
        CalendarComponent, so newly created intakes never had anywhere to show up.
      -->
      <app-intake-alerts *ngIf="isSuperAdmin || isIntakeAdmin"></app-intake-alerts>

      <!--
        The outlet stays permanently mounted (never behind *ngIf) so it's already
        registered with the Router before any navigation to /shifts or /admin/users
        happens. A conditionally-rendered <router-outlet> races the Router's own
        activation against our *ngIf flipping in reaction to that same navigation's
        NavigationEnd — the outlet can miss the activation that created it, which is
        exactly what caused the "only loads after switching tabs away and back" bug.
        An inactive outlet renders nothing, so it's safe to leave present at all times.
      -->
      <router-outlet></router-outlet>

      <ng-container *ngIf="!isAdminUsersRoute() && !isShiftsRoute()">
        <app-samples *ngIf="currentTab === 'samples'" [sampleCalls]="sampleCalls"></app-samples>

        <app-report *ngIf="currentTab === 'report'" [callDuration]="callDuration" [callerType]="callerType"
          [callPurpose]="callPurpose" [summaryNotes]="summaryNotes" [callerName]="callerName" [phone]="phone"
          [email]="email" [region]="region" [gender]="gender" [sector]="sector"
          [receivedSupportAtOtherCenter]="receivedSupportAtOtherCenter"
          [isFamilyMemberOrAcquaintance]="isFamilyMemberOrAcquaintance"
          [magenContactHistory]="magenContactHistory"
          [reportingDuty]="reportingDuty"
          (reportSubmit)="onReportSubmit($event)"></app-report>

        <app-charts *ngIf="currentTab === 'charts'"></app-charts>

        <app-future *ngIf="currentTab === 'future'"></app-future>
      </ng-container>
    </main>
  </div>

  <app-success-modal
    [isOpen]="isSuccessModalOpen"
    title="הדיווח נשמר בהצלחה!"
    [message]="successModalMessage"
    (closed)="closeSuccessModal()"
  ></app-success-modal>
</div>
