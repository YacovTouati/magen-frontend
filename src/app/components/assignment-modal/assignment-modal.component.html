<div class="modal-overlay" *ngIf="isOpen" (click)="onBackdropClick()">
  <div class="modal-panel" role="dialog" aria-modal="true" (click)="onPanelClick($event)">
    <div class="modal-header">
      <div>
        <p class="modal-eyebrow">שיבוץ מתנדב למשמרת</p>
        <h3 class="modal-title">{{ dayLabel }}</h3>
      </div>
      <button type="button" class="modal-close" (click)="onCancel()" aria-label="סגור">✕</button>
    </div>

    <div class="modal-search">
      <input type="text" [(ngModel)]="searchTerm" placeholder="חיפוש לפי שם או אימייל..." class="search-input" />
    </div>

    <div class="modal-body">
      <p *ngIf="isLoading" class="modal-status">טוען משתמשים...</p>
      <p *ngIf="!isLoading && errorMessage" class="modal-status error">{{ errorMessage }}</p>
      <p *ngIf="!isLoading && !errorMessage && filteredUsers.length === 0" class="modal-status">לא נמצאו משתמשים תואמים.</p>

      <ul class="user-list" *ngIf="!isLoading && !errorMessage">
        <li *ngFor="let user of filteredUsers" class="user-row" (click)="onSelect(user)">
          <span class="user-avatar">{{ (user.name || '?').charAt(0) }}</span>
          <span class="user-info">
            <span class="user-name">{{ user.name }}</span>
            <span class="user-email">{{ user.email }}</span>
          </span>
          <span class="user-role-pill" [class.admin]="user.role === 'ADMIN'">{{ getRoleLabel(user.role) }}</span>
        </li>
      </ul>
    </div>

    <div class="modal-footer">
      <button type="button" class="btn-cancel" (click)="onCancel()">ביטול</button>
    </div>
  </div>
</div>
