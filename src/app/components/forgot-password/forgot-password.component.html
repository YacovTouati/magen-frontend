<div class="auth-container" dir="rtl">
  <div class="auth-card">
    <h1 class="main-title">שחזור סיסמה</h1>
    <p class="subtitle">הזינו את כתובת המייל שלכם ונשלח אליכם קישור לאיפוס הסיסמה</p>

    <ng-container *ngIf="submitted; else formTpl">
      <div class="alert success">
        אם קיים חשבון המשויך לכתובת מייל זו, נשלח אליו קישור לאיפוס הסיסמה.
      </div>
      <a routerLink="/login" class="back-link">חזרה למסך הכניסה</a>
    </ng-container>

    <ng-template #formTpl>
      <form (ngSubmit)="onSubmit()" novalidate>
        <div class="form-group">
          <label for="fp-email">כתובת אימייל</label>
          <input id="fp-email" type="email" [(ngModel)]="email" name="email" required class="form-input"
            placeholder="הכנס/י את המייל שלך..." autocomplete="email" />
        </div>

        <div class="alert error" *ngIf="errorMessage">{{ errorMessage }}</div>

        <button type="submit" class="btn btn-primary" [disabled]="!email.trim() || isSubmitting">
          {{ isSubmitting ? 'שולח...' : 'שלח קישור לאיפוס' }}
        </button>

        <a routerLink="/login" class="back-link">חזרה למסך הכניסה</a>
      </form>
    </ng-template>
  </div>
</div>
