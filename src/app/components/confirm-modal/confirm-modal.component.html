<app-modal-shell [isOpen]="isOpen" maxWidth="380px" (backdropClick)="onCancel()">
  <div class="confirm-body">
    <h3 class="confirm-title">{{ title }}</h3>
    <p class="confirm-message">{{ message }}</p>

    <div class="confirm-actions">
      <button type="button" class="btn-secondary" (click)="onCancel()">{{ cancelLabel }}</button>
      <button type="button" class="btn-primary-action" (click)="onConfirm()">{{ confirmLabel }}</button>
    </div>
  </div>
</app-modal-shell>
