<div class="login-container" dir="rtl">
    <div class="login-card">
        <h1 class="main-title">מערכת מגן - קו חם</h1>
        <p class="subtitle">מערכת ניהול ותמיכה מבוססת הרשאות</p>

        <form (ngSubmit)="onSubmit()" novalidate>
            <div class="form-group">
                <label for="login-email">כתובת אימייל</label>
                <input id="login-email" type="email" [(ngModel)]="email" name="email" autocomplete="email"
                    placeholder="הכנס את המייל שלך..." class="form-input" required />
            </div>

            <div class="form-group">
                <label for="login-password">סיסמה</label>
                <input id="login-password" type="password" [(ngModel)]="password" name="password"
                    autocomplete="current-password" placeholder="הכנס סיסמה..." class="form-input" required />
            </div>

            <div class="alert error" *ngIf="errorMessage">{{ errorMessage }}</div>

            <button type="submit" class="btn btn-primary" [disabled]="isSubmitting">
                {{ isSubmitting ? 'מתחבר...' : 'כניסה למערכת' }}
            </button>
        </form>
    </div>
</div>
